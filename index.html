<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-color-theme="black-white">
<head>
    <!-- 原有head内容保持不变 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 省略其他原有meta/link标签 -->
    <title>传讯 - AI对话版</title>
    
    <!-- 新增AI对话所需的API请求库（可选，也可使用原生fetch） -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <style id="css-live-preview-style"></style>
    <style>
        /* 新增AI相关样式 */
        .ai-message {
            background: rgba(197,164,126,0.08) !important;
            border-left: 3px solid rgba(197,164,126,0.8) !important;
        }
        .user-message {
            background: rgba(126,142,197,0.08) !important;
            border-right: 3px solid rgba(126,142,197,0.8) !important;
        }
        .ai-typing {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 12px;
            background: var(--secondary-bg);
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <!-- 原有页面结构保持不变 -->
    <div id="splash-declaration">
        <!-- 原有声明页内容 -->
    </div>

    <!-- 聊天区域（原有结构） -->
    <div class="main-chat-area">
        <div class="history-loader" id="history-loader">
            <div class="history-spinner"></div>
        </div>
        <div class="chat-container" id="chat-container">
            <!-- 消息会动态插入这里 -->
        </div>
        <!-- 原有空状态、输入框等 -->
    </div>

    <!-- 新增AI配置模态框（可选） -->
    <div class="modal" id="ai-settings-modal" style="z-index:3000;">
        <div class="modal-content" style="width: 90%;max-width: 400px;">
            <div class="modal-title">
                <i class="fas fa-robot"></i><span>AI对话设置</span>
            </div>
            <div style="margin: 16px 0;">
                <label style="font-size: 13px;color: var(--text-secondary);margin-bottom: 8px;display: block;">API接口地址</label>
                <input type="text" class="modal-input" id="ai-api-url" placeholder="https://api.example.com/v1/chat/completions" value="https://api.openai.com/v1/chat/completions">
                
                <label style="font-size: 13px;color: var(--text-secondary);margin-bottom: 8px;display: block;margin-top: 12px;">API密钥</label>
                <input type="password" class="modal-input" id="ai-api-key" placeholder="sk-xxx...">
                
                <label style="font-size: 13px;color: var(--text-secondary);margin-bottom: 8px;display: block;margin-top: 12px;">角色设定</label>
                <textarea class="modal-textarea" id="ai-system-prompt" placeholder="设定AI的角色、语气、回复风格..." rows="3">你是一个温柔的陪伴者，用亲切的语气回复用户，语言简洁温暖，符合中文表达习惯。</textarea>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" id="cancel-ai-settings">取消</button>
                <button class="modal-btn modal-btn-primary" id="save-ai-settings">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 全局状态管理
        const chatState = {
            messages: [], // 聊天记录
            isAiResponding: false, // AI是否正在回复
            aiConfig: {
                apiUrl: localStorage.getItem('aiApiUrl') || 'https://api.openai.com/v1/chat/completions',
                apiKey: localStorage.getItem('aiApiKey') || '',
                systemPrompt: localStorage.getItem('aiSystemPrompt') || '你是一个温柔的陪伴者，用亲切的语气回复用户，语言简洁温暖，符合中文表达习惯。'
            }
        };

        // DOM加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            initChat();
            bindEventListeners();
            loadChatHistory();
        });

        // 初始化聊天界面
        function initChat() {
            // 显示空状态
            const emptyState = document.getElementById('empty-state');
            if (chatState.messages.length === 0) {
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
            }
            
            // 初始化AI设置按钮（新增到头部操作栏）
            const headerActions = document.querySelector('.header-actions');
            const aiSettingsBtn = document.createElement('button');
            aiSettingsBtn.className = 'action-btn';
            aiSettingsBtn.title = 'AI设置';
            aiSettingsBtn.innerHTML = '<i class="fas fa-robot"></i>';
            aiSettingsBtn.onclick = () => showModal(document.getElementById('ai-settings-modal'));
            headerActions.insertBefore(aiSettingsBtn, document.getElementById('settings-btn'));
        }

        // 绑定事件监听
        function bindEventListeners() {
            // 发送按钮点击
            document.getElementById('send-btn').addEventListener('click', sendMessage);
            // 输入框回车发送
            document.getElementById('message-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // AI设置保存/取消
            document.getElementById('save-ai-settings').addEventListener('click', saveAiSettings);
            document.getElementById('cancel-ai-settings').addEventListener('click', () => hideModal(document.getElementById('ai-settings-modal')));

            // 原有按钮事件保持不变
        }

        // 发送消息
        async function sendMessage() {
            const inputEl = document.getElementById('message-input');
            const messageText = inputEl.value.trim();
            
            if (!messageText || chatState.isAiResponding) return;

            // 清空输入框
            inputEl.value = '';

            // 添加用户消息到界面
            addMessageToUI({
                role: 'user',
                content: messageText,
                timestamp: new Date().toLocaleTimeString()
            });

            // 隐藏空状态
            document.getElementById('empty-state').style.display = 'none';

            // 标记AI正在回复
            chatState.isAiResponding = true;
            showAiTypingIndicator(true);

            try {
                // 调用AI接口获取回复
                const aiResponse = await fetchAiResponse(messageText);
                // 添加AI回复到界面
                addMessageToUI({
                    role: 'assistant',
                    content: aiResponse,
                    timestamp: new Date().toLocaleTimeString()
                });
            } catch (error) {
                // 错误处理
                addMessageToUI({
                    role: 'assistant',
                    content: `抱歉，回复失败了：${error.message}`,
                    timestamp: new Date().toLocaleTimeString()
                });
                console.error('AI请求失败:', error);
            } finally {
                // 取消加载状态
                chatState.isAiResponding = false;
                showAiTypingIndicator(false);
                // 滚动到底部
                scrollToBottom();
            }
        }

        // 调用AI接口
        async function fetchAiResponse(userInput) {
            // 构造请求体（兼容OpenAI格式）
            const requestBody = {
                model: "gpt-3.5-turbo",
                messages: [
                    { role: 'system', content: chatState.aiConfig.systemPrompt },
                    ...chatState.messages.slice(-10), // 携带最近10条上下文
                    { role: 'user', content: userInput }
                ],
                temperature: 0.8,
                max_tokens: 1000
            };

            const response = await axios({
                url: chatState.aiConfig.apiUrl,
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${chatState.aiConfig.apiKey}`
                },
                data: requestBody
            });

            if (response.data.choices && response.data.choices.length > 0) {
                return response.data.choices[0].message.content;
            } else {
                throw new Error('未获取到有效回复');
            }
        }

        // 添加消息到UI
        function addMessageToUI(message) {
            const chatContainer = document.getElementById('chat-container');
            const messageEl = document.createElement('div');
            messageEl.className = `message-item ${message.role === 'user' ? 'user-message' : 'ai-message'}`;
            
            // 获取头像（复用原有头像逻辑）
            const avatar = message.role === 'user' 
                ? document.getElementById('my-avatar').innerHTML 
                : document.getElementById('partner-avatar').innerHTML;

            // 构建消息HTML
            messageEl.innerHTML = `
                <div class="message-avatar" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 8px;">
                    ${avatar}
                </div>
                <div class="message-content" style="margin: 8px; flex: 1;">
                    <div class="message-text" style="padding: 10px 16px; border-radius: 12px; line-height: 1.6;">
                        ${message.content.replace(/\n/g, '<br>')}
                    </div>
                    <div class="message-time" style="font-size: 10px; color: var(--text-secondary); margin-top: 4px; opacity: 0.7;">
                        ${message.timestamp}
                    </div>
                </div>
            `;

            // 添加到聊天容器
            chatContainer.appendChild(messageEl);
            
            // 更新聊天记录
            chatState.messages.push({
                role: message.role,
                content: message.content
            });
            
            // 保存到本地存储
            saveChatHistory();
            
            // 滚动到底部
            scrollToBottom();
        }

        // 显示/隐藏AI输入指示器
        function showAiTypingIndicator(show) {
            const typingIndicator = document.getElementById('typing-indicator');
            if (show) {
                typingIndicator.style.display = 'flex';
                document.getElementById('typing-indicator-label').textContent = 'AI正在思考...';
            } else {
                typingIndicator.style.display = 'none';
            }
        }

        // 滚动到聊天底部
        function scrollToBottom() {
            const chatContainer = document.getElementById('chat-container');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 保存AI设置
        function saveAiSettings() {
            chatState.aiConfig.apiUrl = document.getElementById('ai-api-url').value.trim();
            chatState.aiConfig.apiKey = document.getElementById('ai-api-key').value.trim();
            chatState.aiConfig.systemPrompt = document.getElementById('ai-system-prompt').value.trim();
            
            // 本地存储持久化
            localStorage.setItem('aiApiUrl', chatState.aiConfig.apiUrl);
            localStorage.setItem('aiApiKey', chatState.aiConfig.apiKey);
            localStorage.setItem('aiSystemPrompt', chatState.aiConfig.systemPrompt);
            
            hideModal(document.getElementById('ai-settings-modal'));
            alert('AI设置已保存');
        }

        // 聊天记录本地存储
        function saveChatHistory() {
            localStorage.setItem('chatHistory', JSON.stringify(chatState.messages));
        }

        // 加载聊天记录
        function loadChatHistory() {
            const savedHistory = localStorage.getItem('chatHistory');
            if (savedHistory) {
                chatState.messages = JSON.parse(savedHistory);
                // 渲染历史消息
                chatState.messages.forEach(msg => {
                    addMessageToUI({
                        role: msg.role,
                        content: msg.content,
                        timestamp: new Date().toLocaleTimeString()
                    });
                });
            }
        }

        // 模态框操作（复用原有逻辑）
        function showModal(modal) {
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function hideModal(modal) {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // 原有页面逻辑（如声明页、欢迎动画等）保持不变
        // ...
    </script>
</body>
</html>
